<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Brianna Three Rex Party</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    #cover {
      position: fixed;
      inset: 0;
      background: url("cover.jpg") center center / cover no-repeat;
      z-index: 10;
      cursor: pointer;
    }

    #cover.hide {
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
  </style>
</head>
<body>

  <video id="video" playsinline webkit-playsinline loop preload="auto" poster="cover.jpg">
    <source src="video.mp4" type="video/mp4">
  </video>

  <audio id="music" preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div id="cover"></div>

  <script>
    const cover = document.getElementById("cover");
    const video = document.getElementById("video");
    const music = document.getElementById("music");

    let started = false;

    function startInvitation() {
      if (started) return;
      started = true;

      video.currentTime = 0;
      music.currentTime = 0;

      const playVideo = video.play();
      const playMusic = music.play();

      Promise.allSettled([playVideo, playMusic]).then(() => {
        cover.classList.add("hide");
      }).catch(() => {
        cover.classList.add("hide");
      });
    }

    cover.addEventListener("touchend", startInvitation, { passive: true });
    cover.addEventListener("click", startInvitation);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brianna Three Rex Party</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
height:100vh;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
display:none;
}

.cover{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("cover.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

</style>

</head>

<body>

<div class="cover" id="cover"></div>

<video id="video" loop playsinline webkit-playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const cover = document.getElementById("cover");
const video = document.getElementById("video");
const music = document.getElementById("music");

cover.addEventListener("click", start);

function start(){

cover.style.display="none";

video.style.display="block";

video.play();

music.play();

}

</script>

</body>
</html>

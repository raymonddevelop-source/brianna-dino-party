<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Brianna Three Rex Party</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
      width: 100%;
      height: 100dvh;
      background: #000;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      object-fit: contain; /* cambia a cover si quieres llenar toda la pantalla */
      background: #000;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 1.4rem;
      text-align: center;
      padding: 24px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <video id="inviteVideo" autoplay muted loop playsinline webkit-playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div id="startScreen" class="start-screen">
    Toca para abrir la invitación
  </div>

  <script>
    const music = document.getElementById("music");
    const startScreen = document.getElementById("startScreen");

    async function startInvitation() {
      try {
        music.volume = 1;
        await music.play();
      } catch (e) {
        console.log("El navegador bloqueó el audio:", e);
      }

      startScreen.classList.add("hidden");
    }

    startScreen.addEventListener("click", startInvitation);
    startScreen.addEventListener("touchstart", startInvitation, { passive: true });
  </script>

</body>
</html>

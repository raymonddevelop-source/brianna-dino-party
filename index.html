<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three Rex Party</title>

<style>

body{
margin:0;
font-family:'Trebuchet MS', sans-serif;
background:linear-gradient(#ffd6eb,#ffc4e4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.card{
background:white;
padding:45px;
border-radius:25px;
width:90%;
max-width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.invite{
font-size:22px;
color:#ff4fa3;
letter-spacing:1px;
}

.name{
font-size:34px;
font-weight:700;
color:#ff2e93;
margin:12px 0;
}

.threerex{
font-size:26px;
color:#ff4fa3;
margin-bottom:10px;
}

.age{
font-size:70px;
font-weight:800;
color:#ff2e93;
margin:10px 0;
}

.divider{
width:80px;
height:4px;
background:#ff4fa3;
margin:15px auto;
border-radius:4px;
}

.info{
font-size:18px;
color:#444;
line-height:1.8;
margin-top:10px;
}

.footer{
margin-top:25px;
font-size:18px;
color:#ff2e93;
font-weight:600;
}

</style>

</head>

<body>

<div class="card">

<div class="invite">Estás invitado</div>

<div class="name">Brianna Nieves</div>

<div class="threerex">Three Rex Party</div>

<div class="age">3</div>

<div class="divider"></div>

<div class="info">

<div>Sábado 6 de junio</div>

<div>2:00 PM</div>

<div>Mi casa</div>

</div>

<div class="footer">
Pool Party<br>
Trae tu traje de baño
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brianna Three Rex Party</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        /* Video siempre listo detrás de la portada */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            z-index: 1;
        }

        /* Portada limpia (solo tu imagen) */
        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("cover.jpg") center/cover no-repeat;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.4s ease; /* Desvanecimiento suave */
        }
    </style>
</head>
<body>

    <video id="video" loop playsinline webkit-playsinline muted preload="auto">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="cover"></div>

    <script>
        const cover = document.getElementById("cover");
        const video = document.getElementById("video");
        const music = document.getElementById("music");

        // Intentar precargar los archivos apenas abra la página
        window.addEventListener('load', () => {
            video.load();
            music.load();
        });

        function start(e) {
            // Evita conflictos entre touch y click
            if (e) e.preventDefault();

            // 1. Desvanecer la portada visualmente
            cover.style.opacity = "0";

            // 2. Reproducción inmediata y simultánea
            music.currentTime = 0;
            video.currentTime = 0;
            
            music.play();
            video.play();

            // 3. Eliminar el elemento del DOM tras el desvanecimiento
            setTimeout(() => {
                cover.style.display = "none";
            }, 450);
        }

        // 'pointerdown' es la interacción más rápida (al tacto inicial)
        cover.addEventListener("pointerdown", start);
    </script>

</body>
</html>

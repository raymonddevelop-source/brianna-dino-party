<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Brianna Three Rex Party</title>

<style>

html,body{
margin:0;
height:100%;
background:black;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
display:none;
}

.cover{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("cover.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-family:sans-serif;
font-size:22px;
text-align:center;
}

</style>

</head>

<body>

<div class="cover" id="cover">
Toca para ver la invitación
</div>

<video id="video" playsinline webkit-playsinline loop>
</video>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const cover = document.getElementById("cover");
const video = document.getElementById("video");
const music = document.getElementById("music");

cover.addEventListener("click", start);

function start(){

video.innerHTML = '<source src="video.mp4" type="video/mp4">';
video.style.display="block";

video.play();
music.play();

cover.style.display="none";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Brianna Three Rex Party</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .cover {
      position: fixed;
      inset: 0;
      background: url("cover.jpg") center center / cover no-repeat;
      z-index: 20;
      cursor: pointer;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
      z-index: 10;
      opacity: 0;
      transition: opacity .35s ease;
    }

    video.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="cover" id="cover"></div>

  <video id="video" loop playsinline webkit-playsinline preload="auto">
    <source src="video.mp4" type="video/mp4">
  </video>

  <audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const cover = document.getElementById("cover");
    const video = document.getElementById("video");
    const music = document.getElementById("music");

    let started = false;

    async function startInvitation() {
      if (started) return;
      started = true;

      try {
        music.currentTime = 0;
        const musicPromise = music.play();

        video.currentTime = 0;
        const videoPromise = video.play();

        await Promise.allSettled([musicPromise, videoPromise]);

        video.classList.add("show");
        cover.style.display = "none";
      } catch (err) {
        console.log(err);
        started = false;
      }
    }

    cover.addEventListener("click", startInvitation);
    cover.addEventListener("touchstart", startInvitation, { passive: true });
  </script>

</body>
</html>

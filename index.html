<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Jurásica</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#1b3d2f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
background:#254f3d;
padding:40px;
border-radius:20px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.invite{
font-size:22px;
color:#ffd166;
}

.name{
font-size:36px;
margin:10px 0;
}

.age{
font-size:24px;
color:#a5ffb2;
}

.dinos{
font-size:42px;
margin:20px 0;
}

.info{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.footer{
margin-top:25px;
font-style:italic;
color:#ffd166;
}

</style>

</head>

<body>

<div class="container">

<div class="invite">¡Estás invitado!</div>

<div class="name">Brianna Nieves</div>

<div class="age">Cumple 3 años</div>

<div class="dinos">🦕 🦖 🦕</div>

<div class="info">

<div>📅 Sábado 6 de junio</div>

<div>⏰ 2:00 PM</div>

<div>📍 Mi casa</div>

</div>

<div class="footer">
Pool Party 🏊‍♀️  
Trae tu traje de baño
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brianna Three Rex Party</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* El video ahora está siempre "debajo" listo para verse */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            z-index: 1;
        }

        /* Portada con transición suave */
        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("cover.jpg") center/cover no-repeat;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease; /* Efecto fade out */
        }

        #cover::after {
            content: "TOCA PARA EMPEZAR";
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <video id="video" loop playsinline webkit-playsinline muted preload="auto">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="cover"></div>

    <script>
        const cover = document.getElementById("cover");
        const video = document.getElementById("video");
        const music = document.getElementById("music");

        // Pre-cargar el video para que el primer frame esté listo
        video.load();
        music.load();

        function start() {
            // 1. Iniciamos la reproducción inmediatamente
            // Usamos una promesa simple para ambos
            const playPromiseAudio = music.play();
            const playPromiseVideo = video.play();

            // 2. Quitamos la portada visualmente de inmediato
            cover.style.opacity = "0";
            
            // 3. Quitamos la portada del flujo después de la animación para que no estorbe
            setTimeout(() => {
                cover.style.display = "none";
            }, 500);

            // Manejo de errores por si el navegador bloquea algo
            if (playPromiseAudio !== undefined) {
                playPromiseAudio.catch(e => console.log("Audio en espera de interacción profunda"));
            }
        }

        // 'pointerdown' es el evento más rápido que existe (antes que el click)
        cover.addEventListener("pointerdown", start);
    </script>

</body>
</html>

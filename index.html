<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brianna Three Rex Party</title>

<style>

html,body{
margin:0;
height:100%;
background:black;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
background:black;
}

#cover{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("cover.jpg") center/cover no-repeat;
z-index:10;
cursor:pointer;
}

</style>

</head>

<body>

<video id="video" loop playsinline webkit-playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="cover"></div>

<script>

const cover = document.getElementById("cover");
const video = document.getElementById("video");
const music = document.getElementById("music");

function start(){

cover.style.display="none";

music.currentTime=0;
music.play();

setTimeout(()=>{
video.currentTime=0;
video.play();
},200);

}

cover.addEventListener("click",start);
cover.addEventListener("touchend",start);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brianna Three Rex Party</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            z-index: 1;
        }

        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("cover.jpg") center/cover no-repeat;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <video id="video" loop playsinline webkit-playsinline muted preload="auto">
        <source src="video.mp4" type="video/mp4">
    </video>

    <audio id="music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="cover"></div>

    <script>
        const cover = document.getElementById("cover");
        const video = document.getElementById("video");
        const music = document.getElementById("music");

        // Esta variable evita que la función se ejecute más de una vez
        let isStarted = false;

        window.addEventListener('load', () => {
            video.load();
            music.load();
        });

        function start(e) {
            // Si ya se inició, no hagas nada (esto evita que se rompa al tocar 2 veces)
            if (isStarted) return;
            
            isStarted = true; // Bloqueamos futuras ejecuciones

            if (e) e.preventDefault();

            // Desvanecer portada
            cover.style.opacity = "0";
            cover.style.pointerEvents = "none"; // Desactiva los clics en la portada inmediatamente

            // Ejecución limpia
            music.currentTime = 0;
            video.currentTime = 0;
            
            // Usamos promesas para que el navegador no se confunda
            const playMusic = music.play();
            const playVideo = video.play();

            // Manejo silencioso de errores de reproducción
            Promise.all([playMusic, playVideo]).catch(err => {
                console.log("Error de reproducción evitado:", err);
            });

            // Limpieza del DOM tras la animación
            setTimeout(() => {
                cover.style.display = "none";
            }, 450);
        }

        // Usamos pointerdown para máxima velocidad de respuesta
        cover.addEventListener("pointerdown", start);
    </script>

</body>
</html>

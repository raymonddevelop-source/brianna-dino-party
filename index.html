<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Brianna Three Rex Party</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #cover {
      position: fixed;
      inset: 0;
      background: url("cover.jpg") center center / cover no-repeat;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .fake-btn {
      padding: 16px 34px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <video id="video" playsinline webkit-playsinline loop preload="auto" poster="cover.jpg">
    <source src="video.mp4" type="video/mp4">
  </video>

  <audio id="music" preload="auto">
    <source src="music.m4a" type="audio/mp4">
  </audio>

  <div id="cover">
    <div class="fake-btn">Abrir invitación</div>
  </div>

  <script>
    const cover = document.getElementById("cover");
    const video = document.getElementById("video");
    const music = document.getElementById("music");

    let started = false;

    async function startInvitation() {
      if (started) return;
      started = true;

      try {
        video.currentTime = 0;
        music.currentTime = 0;

        const hideCoverWhenVideoStarts = new Promise((resolve) => {
          const onPlaying = () => {
            video.removeEventListener("playing", onPlaying);
            resolve();
          };
          video.addEventListener("playing", onPlaying, { once: true });
        });

        const vp = video.play();
        const mp = music.play();

        await Promise.all([vp, mp, hideCoverWhenVideoStarts]);

        cover.classList.add("hidden");
      } catch (e) {
        started = false;
        console.log("No se pudo iniciar:", e);
      }
    }

    cover.addEventListener("click", startInvitation, { once: true });
    cover.addEventListener("touchend", startInvitation, { once: true });
  </script>

</body>
</html>
